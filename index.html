<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字ポーズタッチ - 判定ロック＆音声ガイド版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            overflow: hidden; position: fixed; width: 100%; height: 100%; 
            transition: background-color 0.4s ease;
        }
        canvas { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; }
        video { display: none; }
        
        .hud-container { 
            position: absolute; top: 10px; width: 100%; display: flex; 
            justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 20; 
        }
        .hud-item { font-size: 6vw; font-weight: bold; text-shadow: 2px 2px 4px #000; color: #0f0; }

        #msg { 
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            font-size: 7vw; color: #fff; text-shadow: 2px 2px 4px #000; font-weight: bold; 
            pointer-events: none; z-index: 30;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        #startButton {
            padding: 15px 40px; font-size: 24px; font-weight: bold; border-radius: 50px;
            border: none; background: #e74c3c; color: white; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div class="hud-container">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item" style="color:#fff">Time: <span id="timer">60</span></div>
    </div>

    <div id="msg"></div>

    <div id="overlay">
        <h1 style="color:#ff0; font-size: 10vw;">数字タッチ 1to6</h1>
        <p style="font-size: 4.5vw;">
            中央で「両手を合わせる」とスタート！<br>
            1から6まで順番にタッチしよう！<br>
            <span style="color: #0f0;">※最初は一度手を離すと判定開始</span>
        </p>
        <button id="startButton">はじめる</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startButton');

        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, duration = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        // 音声合成
        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = "ja-JP";
            window.speechSynthesis.speak(uttr);
        }

        let timeLeft = 60, gameActive = false, score = 0;
        let targets = [], nextNumberToFind = 1;
        let lastSelectedTarget = null, dwellStartTime = 0;
        let lastSixPosIndex = -1; 
        
        const DWELL_DURATION = 300;       
        const START_HOLD_DURATION = 300; 
        const HAND_DIST_THRESHOLD = 0.12; 

        let handsTogetherStartTime = 0;
        let isEnding = false;
        let isTouchLocked = false; // スタート直後の判定ロックフラグ

        function updateCanvasSize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', updateCanvasSize);
        updateCanvasSize();

        function generateRound() {
            const slots = [{c: 0, r: 0}, {c: 1, r: 0}, {c: 0, r: 1}, {c: 1, r: 1}, {c: 0, r: 2}, {c: 1, r: 2}];
            let assigned = new Array(6).fill(null);
            let possibleIndicesForOne = [0,1,2,3,4,5].filter(i => i !== lastSixPosIndex);
            let oneIndex = possibleIndicesForOne[Math.floor(Math.random() * possibleIndicesForOne.length)];
            assigned[oneIndex] = 1;
            let remainingNums = [2, 3, 4, 5, 6].sort(() => Math.random() - 0.5);
            let emptySlots = [0,1,2,3,4,5].filter(i => i !== oneIndex);
            emptySlots.forEach((slotIdx, i) => { assigned[slotIdx] = remainingNums[i]; });
            lastSixPosIndex = assigned.indexOf(6);

            targets = slots.map((s, i) => ({
                value: assigned[i], col: s.c, row: s.r,
                x: (canvasElement.width / 2) * s.c + (canvasElement.width / 4),
                y: (canvasElement.height / 3) * s.r + (canvasElement.height / 6),
                active: true
            }));
            nextNumberToFind = 1;
        }

        function drawTarget(ctx, t) {
            if (!t || !t.active) return;
            const size = canvasElement.width * 0.12;
            const isHovered = (lastSelectedTarget === t);
            ctx.beginPath();
            ctx.fillStyle = isHovered ? "#ff0" : "rgba(220, 20, 60, 0.9)";
            ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 5; ctx.stroke();
            ctx.fillStyle = isHovered ? "#000" : "#fff";
            ctx.font = `bold ${size}px sans-serif`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(t.value, t.x, t.y);

            if (isHovered) {
                let progress = (Date.now() - dwellStartTime) / DWELL_DURATION;
                ctx.beginPath(); ctx.strokeStyle = "#0ff"; ctx.lineWidth = 12;
                ctx.arc(t.x, t.y, size + 15, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * Math.min(progress, 1)));
                ctx.stroke();
            }
        }

        function startGame() {
            score = 0; timeLeft = 60;
            scoreEl.innerText = score;
            msgEl.innerText = "";
            isEnding = false;
            gameActive = true;
            isTouchLocked = true; // スタート直後は判定をロック
            generateRound();
            
            const timerInterval = setInterval(() => {
                if (!gameActive) { clearInterval(timerInterval); return; }
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            targets = [];
            isEnding = true;
            msgEl.innerText = "終了！ スコア: " + score;
            document.body.style.backgroundColor = "#000";
            
            // 音声案内
            speak(`終了。スコアは${score}点です。`);
            
            setTimeout(() => {
                if (!gameActive) {
                    isEnding = false;
                    msgEl.innerText = "中央に立ってください";
                }
            }, 5000);
        }

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (!results.poseLandmarks) return;

            const landmarks = results.poseLandmarks;
            const nose = landmarks[0];
            const LH = landmarks[15]; const RH = landmarks[16];
            const L_Elbow = landmarks[13]; const R_Elbow = landmarks[14];
            const L_Shoulder = landmarks[11];

            let inCenter = false;
            if (nose && nose.visibility > 0.5) {
                if (nose.x > 0.35 && nose.x < 0.65) {
                    document.body.style.backgroundColor = "#555"; inCenter = true;
                } else { document.body.style.backgroundColor = "#000"; }
            }

            let hands = [];
            if (LH.visibility > 0.5 && LH.y < L_Elbow.y) hands.push({ x: 1 - LH.x, y: LH.y });
            if (RH.visibility > 0.5 && RH.y < R_Elbow.y) hands.push({ x: 1 - RH.x, y: RH.y });

            let currentHover = null;

            if (gameActive) {
                // --- プレイ中 ---
                const noseX = 1 - nose.x;
                let touchingAny = false; // いま何かに触れているか

                hands.forEach(h => {
                    let col = h.x < noseX ? 0 : 1;
                    const unit = Math.abs(L_Shoulder.y - nose.y);
                    let row = 1;
                    if (h.y < nose.y - unit * 0.4) row = 0;
                    else if (h.y > L_Shoulder.y) row = 2;

                    const found = targets.find(t => t.active && t.col === col && t.row === row);
                    if (found) {
                        touchingAny = true;
                        if (!isTouchLocked) currentHover = found; // ロック解除中のみ代入
                    }
                });

                // スタート後に「手がどこにも触れていない状態」を検知したらロック解除
                if (isTouchLocked && !touchingAny) {
                    isTouchLocked = false;
                }

                targets.forEach(t => drawTarget(canvasCtx, t));

                if (currentHover) {
                    if (lastSelectedTarget === currentHover) {
                        if (Date.now() - dwellStartTime > DWELL_DURATION) {
                            if (currentHover.value === nextNumberToFind) {
                                currentHover.active = false; score++; scoreEl.innerText = score;
                                nextNumberToFind++; playSound(500 + nextNumberToFind * 100);
                                if (nextNumberToFind > 6) generateRound();
                            }
                            lastSelectedTarget = null;
                        }
                    } else {
                        lastSelectedTarget = currentHover; dwellStartTime = Date.now();
                    }
                } else { lastSelectedTarget = null; }

            } else if (!isEnding && (!overlay.style.display || overlay.style.display === 'none')) {
                // --- 開始前待機 ---
                if (inCenter) {
                    msgEl.innerText = "両手を合わせてスタート！";
                    const dist = Math.sqrt(Math.pow(LH.x - RH.x, 2) + Math.pow(LH.y - RH.y, 2));
                    if (dist < HAND_DIST_THRESHOLD) { 
                        if (handsTogetherStartTime === 0) handsTogetherStartTime = Date.now();
                        let progress = (Date.now() - handsTogetherStartTime) / START_HOLD_DURATION;
                        canvasCtx.beginPath(); canvasCtx.strokeStyle = "#0ff"; canvasCtx.lineWidth = 20;
                        canvasCtx.arc(canvasElement.width/2, canvasElement.height/2, 60, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * Math.min(progress, 1)));
                        canvasCtx.stroke();
                        if (progress >= 1) { playSound(880, 0.2); handsTogetherStartTime = 0; startGame(); }
                    } else { handsTogetherStartTime = 0; }
                } else { msgEl.innerText = "中央に立ってください"; handsTogetherStartTime = 0; }
            }
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 720, height: 1280, facingMode: 'user'
        });

        startBtn.addEventListener('click', () => {
            initAudio(); overlay.style.display = 'none';
            msgEl.innerText = "カメラ準備中...";
            camera.start().then(() => { msgEl.innerText = "中央に立ってください"; });
        });
    </script>
</body>
</html>
